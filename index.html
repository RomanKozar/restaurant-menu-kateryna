<!doctype html>
<html lang="uk">
	<head>
		<meta charset="UTF-8" />
		<link rel="preconnect" href="https://cdnjs.cloudflare.com" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Kateryna - Меню</title>
		<link rel="icon" type="image/png" href="logo3.png" />
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div class="header">
			<h1>Kateryna</h1>
			<button class="info-btn" onclick="openInfoModal()">ⓘ</button>
		</div>

		<div class="container" id="menuContainer">
			<p
				id="loading-message"
				style="text-align: center; margin-top: 50px; font-size: 1.2em"
			>
				Завантаження меню...
			</p>
		</div>

		<!-- Dish Modal -->
		<div class="modal" id="dishModal">
			<div class="modal-content">
				<button class="close-btn" onclick="closeModal()">✕</button>
				<img class="modal-image" id="modalImage" src="" alt="" />
				<h2 class="modal-title" id="modalTitle"></h2>
				<div class="modal-details">
					<div><strong>Вага:</strong> <span id="modalWeight"></span></div>
					<div>
						<strong>Час приготування:</strong> <span id="modalTime"></span>
					</div>
				</div>
				<p class="modal-description" id="modalDescription"></p>
				<div class="modal-footer">
					<div class="quantity-control">
						<button onclick="decreaseQuantity()">−</button>
						<span>Кількість: <span id="quantity">1</span></span>
						<button onclick="increaseQuantity()">+</button>
					</div>
					<div class="modal-price-section">
						<div class="modal-price-label">Разом:</div>
						<div class="modal-price">₴ <span id="modalPrice"></span></div>
					</div>
				</div>
			</div>
		</div>

		<!-- Info Modal -->
		<div class="modal" id="infoModal">
			<div class="info-modal-content">
				<button class="close-btn" onclick="closeInfoModal()">✕</button>
				<h2>Контакти</h2>
				<div class="info-item">
					<strong>📞 Телефони:</strong>
					<a href="tel:+380993377557">+380 99 337 75 57</a>
					<br />
					<a href="tel:+380673460556">+380 67 346 05 56</a>
					<br />
					<a href="tel:+380980337755">+380 98 033 77 55</a>
				</div>
				<div class="info-item">
					<strong>📍 Адреса:</strong>
					<p>вул. Сонячна 55<br />с. Поляна</p>
				</div>
				<div class="info-item">
					<strong>🕒 Години роботи:</strong>
					<p>Пн-Нд: 08:30 - 22:00</p>
				</div>
			</div>
		</div>

		<!-- Firebase SDKs -->
		<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
